<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Trading Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #63b3ed; }
    .badge { background: #2d3748; color: #68d391; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge.live { background: #22543d; color: #68d391; }
    .badge.paper { background: #2a4365; color: #90cdf4; }
    .tabs { display: flex; background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 0 24px; gap: 4px; }
    .tab { padding: 12px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 14px; color: #718096; transition: all 0.15s; }
    .tab:hover { color: #e2e8f0; }
    .tab.active { color: #63b3ed; border-bottom-color: #63b3ed; font-weight: 600; }
    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; }
    .card h3 { font-size: 13px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #e2e8f0; }
    .stat-sub { font-size: 12px; color: #718096; margin-top: 4px; }
    .pos { color: #68d391; }
    .neg { color: #fc8181; }
    .neutral { color: #90cdf4; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #718096; font-weight: 500; border-bottom: 1px solid #2d3748; font-size: 12px; text-transform: uppercase; }
    td { padding: 8px 12px; border-bottom: 1px solid #1e2433; vertical-align: middle; }
    tr:hover td { background: #222640; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag.won { background: #22543d; color: #68d391; }
    .tag.lost { background: #742a2a; color: #fc8181; }
    .tag.open { background: #2a4365; color: #90cdf4; }
    .tag.shadow { background: #44337a; color: #d6bcfa; }
    .tag.promoted { background: #1a365d; color: #63b3ed; }
    .tag.pending { background: #2d3748; color: #a0aec0; }
    .loading { color: #718096; font-size: 14px; text-align: center; padding: 40px; }
    .error-msg { color: #fc8181; font-size: 13px; padding: 8px; background: #742a2a22; border-radius: 6px; }
    .refresh-btn { margin-left: auto; background: #2d3748; color: #90cdf4; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .refresh-btn:hover { background: #4a5568; }
    .bar-container { display: flex; align-items: center; gap: 8px; }
    .bar { height: 8px; border-radius: 4px; background: #2d3748; flex: 1; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API = "http://localhost:5001/api";

function useApi(endpoint, deps = []) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  React.useEffect(() => {
    setLoading(true);
    fetch(API + endpoint)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, deps);
  return { data, loading, error };
}

function fmt(v, decimals = 2) {
  if (v == null) return "—";
  return Number(v).toFixed(decimals);
}

function fmtPnl(v) {
  if (v == null) return <span className="neutral">—</span>;
  const n = Number(v);
  return <span className={n >= 0 ? "pos" : "neg"}>{n >= 0 ? "+" : ""}{n.toFixed(2)}</span>;
}

function fmtPct(v) {
  if (v == null) return "—";
  return (Number(v) * 100).toFixed(1) + "%";
}

function StatusTag({ status }) {
  const s = (status || "").toLowerCase();
  let cls = "open";
  if (s === "won") cls = "won";
  else if (s === "lost") cls = "lost";
  else if (s === "shadow") cls = "shadow";
  else if (s === "promoted") cls = "promoted";
  else if (s === "pending" || s === "running") cls = "pending";
  return <span className={`tag ${cls}`}>{status}</span>;
}

// ─── Quick Stats Bar ────────────────────────────────────────────────────────
function QuickStats() {
  const { data, loading } = useApi("/quick_stats");
  if (loading || !data) return null;
  const items = [
    { label: "Bankroll", value: `$${fmt(data.bankroll)}` },
    { label: "Total P&L", value: fmtPnl(data.total_pnl) },
    { label: "Open", value: data.open_positions ?? "—" },
    { label: "Win Rate", value: data.win_rate != null ? fmtPct(data.win_rate) : "—" },
    { label: "Experiments", value: data.experiments_run ?? "—" },
  ];
  return (
    <div style={{display:'flex', gap:12, padding:'10px 24px', background:'#131625', borderBottom:'1px solid #2d3748', flexWrap:'wrap'}}>
      {items.map(it => (
        <div key={it.label} style={{display:'flex', gap:6, alignItems:'center', fontSize:13}}>
          <span style={{color:'#718096'}}>{it.label}:</span>
          <span style={{fontWeight:600}}>{it.value}</span>
        </div>
      ))}
      {data.last_cycle?.cycle_at && (
        <div style={{marginLeft:'auto', fontSize:11, color:'#718096'}}>
          Last cycle: {new Date(data.last_cycle.cycle_at).toLocaleTimeString()} &nbsp;
          signals={data.last_cycle.signals_generated ?? "—"} &nbsp;
          executed={data.last_cycle.executed ?? "—"}
        </div>
      )}
    </div>
  );
}

// ─── Last Cycle Panel ────────────────────────────────────────────────────────
function LastCyclePanel() {
  const { data, loading } = useApi("/last_cycle");
  if (loading || !data || !data.cycle_at) return null;
  return (
    <div className="card" style={{marginBottom: 16}}>
      <h3>Last Cycle — {new Date(data.cycle_at).toLocaleString()}</h3>
      <div style={{display:'flex', gap:20, flexWrap:'wrap', marginTop: 8}}>
        {[
          ["Signals Generated", data.signals_generated],
          ["Executable", data.signals_executable],
          ["Shadow", data.signals_shadow],
          ["Filtered", data.signals_filtered],
          ["Executed", data.executed],
          ["Exits", data.exits],
        ].map(([label, val]) => (
          <div key={label}>
            <div style={{fontSize:12, color:'#718096'}}>{label}</div>
            <div style={{fontSize:20, fontWeight:700}}>{val ?? "—"}</div>
          </div>
        ))}
        <div>
          <div style={{fontSize:12, color:'#718096'}}>Dry Run</div>
          <div style={{fontSize:20, fontWeight:700}}>{data.dry_run ? "Yes" : "No"}</div>
        </div>
      </div>
    </div>
  );
}

// ─── Chart helpers ───────────────────────────────────────────────────────────
function BankrollChart({ daily }) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);

  React.useEffect(() => {
    if (!daily || daily.length === 0 || !ref.current) return;
    const sorted = [...daily].reverse();
    const labels = sorted.map(d => d.date);
    const values = sorted.map(d => d.cumulative_pnl ?? 0);

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Cumulative P&L ($)",
          data: values,
          borderColor: "#63b3ed",
          backgroundColor: "rgba(99,179,237,0.1)",
          fill: true,
          tension: 0.3,
          pointRadius: 3,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#718096", maxTicksLimit: 10 }, grid: { color: "#1e2433" } },
          y: { ticks: { color: "#718096" }, grid: { color: "#1e2433" } },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [daily]);

  if (!daily || daily.length === 0) return <div className="stat-sub">No P&L history yet</div>;
  return <canvas ref={ref} height={120} />;
}

function DailyBarsChart({ daily }) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);

  React.useEffect(() => {
    if (!daily || daily.length === 0 || !ref.current) return;
    const sorted = [...daily].reverse().slice(-30);
    const labels = sorted.map(d => d.date.slice(5));
    const wins = sorted.map(d => d.num_wins ?? 0);
    const losses = sorted.map(d => Math.max(0, (d.num_trades ?? 0) - (d.num_wins ?? 0)));

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: "bar",
      data: {
        labels,
        datasets: [
          { label: "Wins", data: wins, backgroundColor: "#68d391", stack: "s" },
          { label: "Losses", data: losses, backgroundColor: "#fc8181", stack: "s" },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#a0aec0" } } },
        scales: {
          x: { stacked: true, ticks: { color: "#718096" }, grid: { color: "#1e2433" } },
          y: { stacked: true, ticks: { color: "#718096" }, grid: { color: "#1e2433" } },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [daily]);

  if (!daily || daily.length === 0) return <div className="stat-sub">No trade history yet</div>;
  return <canvas ref={ref} height={120} />;
}

// ─── Tab 1: Live Trading ────────────────────────────────────────────────────
function Tab1() {
  const { data: portfolio } = useApi("/portfolio");
  const { data: positions, loading: posLoading } = useApi("/positions?status=open&limit=50");
  const { data: recent } = useApi("/trades/recent?limit=20");
  const { data: allocations } = useApi("/allocations");
  const { data: clusters } = useApi("/cluster_exposure");
  const { data: qs } = useApi("/quick_stats");
  const { data: daily } = useApi("/daily_pnl");

  const bankroll = portfolio?.bankroll ?? 0;
  const totalPnl = portfolio?.total_pnl ?? 0;

  return (
    <div className="grid" style={{gap: 20}}>
      <LastCyclePanel />
      {/* KPI row */}
      <div className="grid grid-4">
        <div className="card">
          <h3>Bankroll</h3>
          <div className="stat-value">${fmt(bankroll)}</div>
          <div className="stat-sub">Available capital</div>
        </div>
        <div className="card">
          <h3>Today's P&L</h3>
          <div className="stat-value">{fmtPnl(qs?.daily_pnl)}</div>
          <div className="stat-sub">{qs?.trades_today ?? 0} trades today</div>
        </div>
        <div className="card">
          <h3>Win Rate (30d)</h3>
          <div className="stat-value">{qs?.win_rate_30d != null ? qs.win_rate_30d + "%" : "—"}</div>
          <div className="stat-sub">Last 30 days</div>
        </div>
        <div className="card">
          <h3>Open Positions</h3>
          <div className="stat-value">{positions?.length ?? "—"}</div>
          <div className="stat-sub">${fmt(positions?.reduce((s, p) => s + (p.size_usd || 0), 0) ?? 0)} exposure</div>
        </div>
      </div>

      {/* Charts row */}
      <div className="grid grid-2">
        <div className="card">
          <h3>Cumulative P&L</h3>
          <BankrollChart daily={daily} />
        </div>
        <div className="card">
          <h3>Daily Wins / Losses (last 30 days)</h3>
          <DailyBarsChart daily={daily} />
        </div>
      </div>

      <div className="grid grid-2">
        {/* Strategy allocation */}
        <div className="card">
          <h3>Strategy Allocation</h3>
          {allocations?.map(a => (
            <div key={a.strategy_name} style={{marginBottom: 12}}>
              <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 4}}>
                <span>{a.strategy_name}</span>
                <span className="neutral">${fmt(a.total_exposure || 0)}</span>
              </div>
              <div className="bar-container">
                <div className="bar">
                  <div className="bar-fill" style={{
                    width: `${Math.min(100, (a.total_exposure || 0) / Math.max(bankroll, 1) * 100)}%`,
                    background: '#63b3ed'
                  }}/>
                </div>
                <span style={{fontSize: 12, color: '#718096', minWidth: 36}}>
                  {fmt((a.total_exposure || 0) / Math.max(bankroll, 1) * 100, 1)}%
                </span>
              </div>
            </div>
          ))}
        </div>

        {/* Cluster exposure */}
        <div className="card">
          <h3>Cluster Exposure</h3>
          {clusters?.map(c => (
            <div key={c.city} style={{display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '4px 0', borderBottom: '1px solid #1e2433'}}>
              <span>{c.city}</span>
              <span>${fmt(c.exposure_usd || 0)} ({c.open_positions} pos)</span>
            </div>
          ))}
          {(!clusters || clusters.length === 0) && <div className="stat-sub">No open positions</div>}
        </div>
      </div>

      {/* Open positions */}
      <div className="card">
        <div className="section-header">
          <h2>Open Positions</h2>
        </div>
        {posLoading ? <div className="loading">Loading...</div> : (
          <table>
            <thead><tr>
              <th>Ticker</th><th>City</th><th>Side</th><th>Entry</th>
              <th>Size</th><th>Edge</th><th>Opened</th><th>Status</th>
            </tr></thead>
            <tbody>
              {(positions || []).map(p => (
                <tr key={p.id}>
                  <td style={{fontFamily: 'monospace', fontSize: 12}}>{p.ticker}</td>
                  <td>{p.city}</td>
                  <td><span className={p.side === 'YES' ? 'pos' : 'neg'}>{p.side}</span></td>
                  <td>{fmt(p.entry_price, 3)}</td>
                  <td>${fmt(p.size_usd)}</td>
                  <td>{p.executable_edge != null ? fmt(p.executable_edge, 3) : "—"}</td>
                  <td style={{fontSize: 11, color: '#718096'}}>{(p.opened_at || "").substring(0, 16)}</td>
                  <td><StatusTag status={p.status} /></td>
                </tr>
              ))}
              {(!positions || positions.length === 0) && (
                <tr><td colSpan={8} style={{textAlign: 'center', color: '#718096', padding: 24}}>No open positions</td></tr>
              )}
            </tbody>
          </table>
        )}
      </div>

      {/* Recent trades / Opportunities */}
      <div className="card">
        <h2 style={{marginBottom: 16}}>Recent Signals</h2>
        <table>
          <thead><tr>
            <th>Age</th><th>Strategy</th><th>Ticker</th><th>City</th>
            <th>Fair Value</th><th>Market Price</th><th>Edge</th>
          </tr></thead>
          <tbody>
            {(recent || []).map(t => {
              const ageMs  = Date.now() - new Date((t.created_at || '') + 'Z').getTime();
              const ageMin = Math.floor(ageMs / 60000);
              const fresh  = ageMin < 10;
              const ageStr = ageMin < 60 ? `${ageMin}m ago` : `${Math.floor(ageMin/60)}h ago`;
              const freshBadge = fresh
                ? <span style={{color:'#68d391',fontSize:11,fontWeight:700}}>● LIVE</span>
                : <span style={{color:'#718096',fontSize:11}}>{ageStr}</span>;
              return (
                <tr key={t.id} style={{opacity: fresh ? 1 : 0.6}}>
                  <td>{freshBadge}</td>
                  <td>{t.strategy_name}</td>
                  <td style={{fontFamily: 'monospace', fontSize: 12}}>{t.ticker}</td>
                  <td>{t.city}</td>
                  <td>{fmt(t.fair_value, 3)}</td>
                  <td>{fmt(t.market_price, 3)}</td>
                  <td className={t.executable_edge > 0 ? 'pos' : 'neg'}>{fmt(t.executable_edge, 3)}</td>
                </tr>
              );
            })}
            {(!recent || recent.length === 0) && (
              <tr><td colSpan={7} style={{textAlign: 'center', color: '#718096', padding: 24}}>No trades yet</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Tab 2: Strategy Performance ────────────────────────────────────────────
function Tab2() {
  const { data: perf } = useApi("/strategy_performance");
  const { data: brier } = useApi("/brier_trend");
  const { data: mfemae } = useApi("/mfe_mae?limit=200");

  return (
    <div className="grid" style={{gap: 20}}>
      <div className="card">
        <h2 style={{marginBottom: 16}}>Per-Strategy KPIs</h2>
        <table>
          <thead><tr>
            <th>Strategy</th><th>Type</th><th>Trades</th><th>Win Rate</th>
            <th>Total P&L</th><th>Avg P&L</th><th>Avg Hold (h)</th>
            <th>Avg MFE</th><th>Avg MAE</th>
          </tr></thead>
          <tbody>
            {(perf || []).map((s, i) => (
              <tr key={i}>
                <td><strong>{s.strategy_name}</strong></td>
                <td>{s.is_shadow ? <span className="tag shadow">Shadow</span> : <span className="tag open">Live</span>}</td>
                <td>{s.trade_count}</td>
                <td>{fmtPct(s.win_rate)}</td>
                <td>{fmtPnl(s.total_pnl)}</td>
                <td>{fmtPnl(s.avg_pnl)}</td>
                <td>{fmt(s.avg_hold_hours, 1)}</td>
                <td>{fmt(s.avg_mfe, 3)}</td>
                <td>{fmt(s.avg_mae, 3)}</td>
              </tr>
            ))}
            {(!perf || perf.length === 0) && (
              <tr><td colSpan={9} style={{textAlign: 'center', color: '#718096', padding: 24}}>No resolved trades yet</td></tr>
            )}
          </tbody>
        </table>
      </div>

      <div className="grid grid-2">
        <div className="card">
          <h3>Brier Score Trend</h3>
          {(brier || []).length === 0
            ? <div className="stat-sub">No data yet</div>
            : <table>
                <thead><tr><th>Strategy</th><th>Date</th><th>Avg Brier</th><th>N</th></tr></thead>
                <tbody>
                  {(brier || []).slice(-20).map((b, i) => (
                    <tr key={i}>
                      <td>{b.strategy_name}</td>
                      <td>{b.date}</td>
                      <td className={b.avg_brier < 0.2 ? 'pos' : 'neg'}>{fmt(b.avg_brier, 4)}</td>
                      <td>{b.n}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>

        <div className="card">
          <h3>MFE vs MAE (last 200 trades)</h3>
          {(mfemae || []).length === 0
            ? <div className="stat-sub">No data yet</div>
            : <table>
                <thead><tr><th>Strategy</th><th>City</th><th>MFE</th><th>MAE</th><th>P&L</th></tr></thead>
                <tbody>
                  {(mfemae || []).slice(0, 15).map((m, i) => (
                    <tr key={i}>
                      <td>{m.strategy_name}</td>
                      <td>{m.city}</td>
                      <td className="pos">{fmt(m.mfe, 3)}</td>
                      <td className="neg">{fmt(m.mae, 3)}</td>
                      <td>{fmtPnl(m.realized_pnl)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      </div>
    </div>
  );
}

// ─── Tab 3: Autoresearch ─────────────────────────────────────────────────────
function Tab3() {
  const { data: exps } = useApi("/experiments?limit=30");
  const { data: candidates } = useApi("/promotion_candidates");
  const [running, setRunning] = React.useState(false);
  const [runResult, setRunResult] = React.useState(null);

  function runExperiment() {
    setRunning(true);
    setRunResult(null);
    fetch(API + "/autoresearch/run", { method: "POST" })
      .then(r => r.json())
      .then(d => { setRunResult(d); setRunning(false); })
      .catch(e => { setRunResult({ error: e.message }); setRunning(false); });
  }

  return (
    <div className="grid" style={{gap: 20}}>
      {/* Run button */}
      <div className="card" style={{display:'flex', alignItems:'center', gap:16, padding:16}}>
        <button
          onClick={runExperiment}
          disabled={running}
          style={{background: running ? '#2d3748' : '#2b6cb0', color:'#fff', border:'none', padding:'8px 20px', borderRadius:6, cursor: running ? 'not-allowed' : 'pointer', fontWeight:600}}
        >
          {running ? "Running…" : "▶ Run Experiment"}
        </button>
        {runResult && !runResult.error && (
          <span style={{fontSize:13}}>
            Experiment <code>{runResult.experiment_id}</code> &nbsp;
            baseline={fmt(runResult.baseline_brier,4)} → candidate={fmt(runResult.candidate_brier,4)} &nbsp;
            <span className={runResult.improvement_pct > 0 ? 'pos' : 'neg'}>
              {runResult.improvement_pct > 0 ? "+" : ""}{fmt(runResult.improvement_pct,1)}%
            </span>
            {runResult.promoted && <span className="tag promoted" style={{marginLeft:8}}>PROMOTED</span>}
          </span>
        )}
        {runResult?.error && <span className="error-msg">{runResult.error}</span>}
      </div>
      {/* Promotion candidates */}
      {candidates && candidates.length > 0 && (
        <div className="card" style={{border: '1px solid #3182ce'}}>
          <h3 style={{color: '#63b3ed'}}>⭐ Promotion Candidates</h3>
          <table>
            <thead><tr><th>Strategy</th><th>Score</th><th>Trades</th><th>Win Rate</th><th>Brier</th><th>Computed At</th></tr></thead>
            <tbody>
              {candidates.map((c, i) => (
                <tr key={i}>
                  <td><strong>{c.strategy_name}</strong></td>
                  <td className="pos">{fmt(c.score, 1)}</td>
                  <td>{c.trade_count}</td>
                  <td>{fmtPct(c.win_rate)}</td>
                  <td>{fmt(c.avg_brier, 4)}</td>
                  <td style={{fontSize: 11, color: '#718096'}}>{(c.computed_at || "").substring(0, 16)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Experiment registry */}
      <div className="card">
        <h2 style={{marginBottom: 16}}>Experiment Registry</h2>
        <table>
          <thead><tr>
            <th>ID</th><th>Description</th><th>Baseline Brier</th><th>Candidate Brier</th>
            <th>Improvement</th><th>Trades</th><th>Status</th><th>Date</th>
          </tr></thead>
          <tbody>
            {(exps || []).map(e => (
              <tr key={e.id}>
                <td style={{fontFamily: 'monospace', fontSize: 12}}>{e.id}</td>
                <td style={{maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis'}}>{e.description}</td>
                <td>{fmt(e.baseline_brier, 4)}</td>
                <td>{fmt(e.candidate_brier, 4)}</td>
                <td className={e.improvement_pct > 0 ? 'pos' : 'neg'}>
                  {e.improvement_pct != null ? (e.improvement_pct > 0 ? "+" : "") + fmt(e.improvement_pct, 1) + "%" : "—"}
                </td>
                <td>{e.trade_count ?? "—"}</td>
                <td><StatusTag status={e.status} /></td>
                <td style={{fontSize: 11, color: '#718096'}}>{(e.created_at || "").substring(0, 16)}</td>
              </tr>
            ))}
            {(!exps || exps.length === 0) && (
              <tr><td colSpan={8} style={{textAlign: 'center', color: '#718096', padding: 24}}>
                No experiments yet. Run: <code>python main.py --autoresearch</code>
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Tab 4: Forecast Quality ─────────────────────────────────────────────────
function Tab4() {
  const { data: bias } = useApi("/forecast_bias");
  const { data: agreement } = useApi("/model_agreement");
  const { data: scatter } = useApi("/settlement_vs_forecast");

  return (
    <div className="grid" style={{gap: 20}}>
      <div className="grid grid-2">
        <div className="card">
          <h3>Per-City, Per-Model Bias</h3>
          <table>
            <thead><tr><th>City</th><th>Model</th><th>N</th><th>Bias (°F)</th><th>MAE (°F)</th></tr></thead>
            <tbody>
              {(bias || []).map((b, i) => (
                <tr key={i}>
                  <td>{b.city}</td>
                  <td>{b.model_name}</td>
                  <td>{b.n_obs}</td>
                  <td className={Math.abs(b.bias_f) < 1 ? 'pos' : 'neg'}>{fmt(b.bias_f, 2)}</td>
                  <td>{fmt(b.mae_f, 2)}</td>
                </tr>
              ))}
              {(!bias || bias.length === 0) && (
                <tr><td colSpan={5} style={{textAlign: 'center', color: '#718096', padding: 24}}>
                  No resolved forecasts yet
                </td></tr>
              )}
            </tbody>
          </table>
        </div>

        <div className="card">
          <h3>Model Agreement (recent)</h3>
          <table>
            <thead><tr><th>City</th><th>Date</th><th>Models</th><th>Mean High</th><th>Spread</th></tr></thead>
            <tbody>
              {(agreement || []).slice(0, 15).map((a, i) => (
                <tr key={i}>
                  <td>{a.city}</td>
                  <td>{a.target_date}</td>
                  <td>{a.n_models}</td>
                  <td>{fmt(a.mean_high_f, 1)}°F</td>
                  <td className={a.spread_f > 5 ? 'neg' : 'pos'}>{fmt(a.spread_f, 1)}°F</td>
                </tr>
              ))}
              {(!agreement || agreement.length === 0) && (
                <tr><td colSpan={5} style={{textAlign: 'center', color: '#718096', padding: 24}}>No forecasts yet</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <h3>Settlement vs Forecast (residuals)</h3>
        <table>
          <thead><tr><th>City</th><th>Model</th><th>Date</th><th>Predicted</th><th>Actual</th><th>Residual</th></tr></thead>
          <tbody>
            {(scatter || []).slice(0, 20).map((s, i) => (
              <tr key={i}>
                <td>{s.city}</td>
                <td>{s.model_name}</td>
                <td>{s.target_date}</td>
                <td>{fmt(s.predicted_high_f, 1)}°F</td>
                <td>{fmt(s.actual_high_f, 1)}°F</td>
                <td className={Math.abs(s.residual) < 2 ? 'pos' : 'neg'}>{fmt(s.residual, 1)}°F</td>
              </tr>
            ))}
            {(!scatter || scatter.length === 0) && (
              <tr><td colSpan={6} style={{textAlign: 'center', color: '#718096', padding: 24}}>No settlement data yet</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Tab 5: History ──────────────────────────────────────────────────────────
function Tab5() {
  const { data: closed, loading: closedLoading } = useApi("/positions?status=closed&limit=100");
  const { data: daily, loading: dailyLoading } = useApi("/daily_pnl");

  return (
    <div className="grid" style={{gap: 20}}>
      {/* Daily PnL History */}
      <div className="card">
        <h2 style={{marginBottom: 16}}>Daily P&L History</h2>
        {dailyLoading ? <div className="loading">Loading...</div> : (
          <table>
            <thead><tr>
              <th>Date</th><th>Realized P&L</th><th>Cumulative P&L</th>
              <th>Trades</th><th>Wins</th><th>Win Rate</th>
            </tr></thead>
            <tbody>
              {(daily || []).map((d, i) => (
                <tr key={i}>
                  <td>{d.date}</td>
                  <td>{fmtPnl(d.realized_pnl)}</td>
                  <td>{fmtPnl(d.cumulative_pnl)}</td>
                  <td>{d.num_trades}</td>
                  <td>{d.num_wins}</td>
                  <td>{d.win_rate != null ? fmtPct(d.win_rate) : "—"}</td>
                </tr>
              ))}
              {(!daily || daily.length === 0) && (
                <tr><td colSpan={6} style={{textAlign: 'center', color: '#718096', padding: 24}}>No daily P&L data yet</td></tr>
              )}
            </tbody>
          </table>
        )}
      </div>

      {/* Closed Positions */}
      <div className="card">
        <h2 style={{marginBottom: 16}}>Closed Positions</h2>
        {closedLoading ? <div className="loading">Loading...</div> : (
          <table>
            <thead><tr>
              <th>Ticker</th><th>City</th><th>Strategy</th><th>Side</th>
              <th>Entry</th><th>Exit</th><th>Size</th><th>P&L</th>
              <th>Hold (h)</th><th>Status</th><th>Closed</th>
            </tr></thead>
            <tbody>
              {(closed || []).map(p => (
                <tr key={p.id}>
                  <td style={{fontFamily: 'monospace', fontSize: 12}}>{p.ticker}</td>
                  <td>{p.city}</td>
                  <td>{p.strategy_name}</td>
                  <td><span className={p.side === 'YES' ? 'pos' : 'neg'}>{p.side}</span></td>
                  <td>{fmt(p.entry_price, 3)}</td>
                  <td>{fmt(p.exit_price, 3)}</td>
                  <td>${fmt(p.size_usd)}</td>
                  <td>{fmtPnl(p.realized_pnl)}</td>
                  <td>{fmt(p.hold_time_hours, 1)}</td>
                  <td><StatusTag status={p.status} /></td>
                  <td style={{fontSize: 11, color: '#718096'}}>{(p.closed_at || "").substring(0, 16)}</td>
                </tr>
              ))}
              {(!closed || closed.length === 0) && (
                <tr><td colSpan={11} style={{textAlign: 'center', color: '#718096', padding: 24}}>No closed positions yet</td></tr>
              )}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Root App ────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState(0);
  const [lastUpdate, setLastUpdate] = React.useState(new Date().toLocaleTimeString());
  const tabs = ["Live Trading", "Strategy Performance", "Autoresearch", "Forecast Quality", "History"];

  function refresh() {
    setLastUpdate(new Date().toLocaleTimeString());
    // Force re-render by toggling tab
    setTab(t => t);
    window.location.reload();
  }

  return (
    <div>
      <div className="header">
        <h1>🌤 Weather Trading Bot</h1>
        <span className="badge paper">Paper Mode</span>
        <span style={{fontSize: 12, color: '#718096', marginLeft: 8}}>
          Updated: {lastUpdate}
        </span>
        <button className="refresh-btn" onClick={refresh}>↻ Refresh</button>
      </div>
      <QuickStats />
      <div className="tabs">
        {tabs.map((t, i) => (
          <div key={i} className={`tab ${tab === i ? "active" : ""}`} onClick={() => setTab(i)}>
            {t}
          </div>
        ))}
      </div>
      <div className="content">
        {tab === 0 && <Tab1 />}
        {tab === 1 && <Tab2 />}
        {tab === 2 && <Tab3 />}
        {tab === 3 && <Tab4 />}
        {tab === 4 && <Tab5 />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
